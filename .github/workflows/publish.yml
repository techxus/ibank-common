name: Publish Parent & Trigger Services

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compute version
        id: ver
        run: echo "version=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Deploy Parent and Libs
        run: mvn -B -U clean deploy -Drevision=${{ steps.ver.outputs.version }} -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-services:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ needs.publish.result == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        repo:
          - ibank-user-service
          - ibank-reporting-service

    env:
      OWNER: techxus
      VERSION: ${{ needs.publish.outputs.version }}
      PAT: ${{ secrets.GHA_PAT }}

    steps:
      - name: Trigger service build
        shell: bash
        run: |
          REPO="${{ matrix.repo }}"

          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/dispatches" \
            -d "{\"event_type\":\"parent_updated\",\"client_payload\":{\"ibank_version\":\"${VERSION}\"}}"