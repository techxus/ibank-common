name: Publish Parent & Trigger Services

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compute version
        id: ver
        run: echo "version=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Deploy Parent and Libs
        run: mvn -B -U clean deploy -Drevision=${{ steps.ver.outputs.version }} -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-services:
    runs-on: ubuntu-latest
    needs: publish

    strategy:
      fail-fast: false
      matrix:
        repo: [user-service, reporting-service]

    steps:
      - name: Update IBANK_VERSION variable
        env:
          GH_TOKEN: ${{ secrets.GHA_PAT }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ matrix.repo }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /repos/${OWNER}/${REPO}/actions/variables/IBANK_VERSION \
            -f name=IBANK_VERSION \
            -f value="${VERSION}" \
          || \
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${OWNER}/${REPO}/actions/variables \
            -f name=IBANK_VERSION \
            -f value="${VERSION}"

      - name: Trigger service build
        env:
          GH_TOKEN: ${{ secrets.GHA_PAT }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ matrix.repo }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${OWNER}/${REPO}/dispatches \
            -f event_type=parent_updated \
            -f client_payload[ibank_version]="${VERSION}"