name: Publish Parent & Trigger Services

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compute version
        id: ver
        run: echo "version=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Deploy Parent and Libs
        run: mvn -B -U clean deploy -Drevision=${{ steps.ver.outputs.version }} -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  discover-services:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ needs.publish.result == 'success' }}

    outputs:
      repos: ${{ steps.discover.outputs.repos }}

    env:
      OWNER: techxus
      PAT: ${{ secrets.GHA_PAT }}

    steps:
      - name: Discover service repos
        id: discover
        shell: bash
        run: |
          REPOS=$(curl --fail --silent --show-error \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${OWNER}/repos?per_page=100" \
            | jq -c '[.[].name | select(test("^ibank-.*-service$"))]')

          echo "repos=${REPOS}" >> "$GITHUB_OUTPUT"
          echo "Discovered repos: ${REPOS}"

  trigger-services:
    runs-on: ubuntu-latest
    needs: [publish, discover-services]
    if: ${{ needs.publish.result == 'success' && needs.discover-services.outputs.repos != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover-services.outputs.repos) }}

    env:
      OWNER: techxus
      VERSION: ${{ needs.publish.outputs.version }}
      PAT: ${{ secrets.GHA_PAT }}

    steps:
      - name: Trigger service build
        shell: bash
        run: |
          REPO="${{ matrix.repo }}"

          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/dispatches" \
            -d "{\"event_type\":\"parent_updated\",\"client_payload\":{\"ibank_version\":\"${VERSION}\"}}"